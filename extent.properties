# Turn on Spark (HTML) reporter
extent.reporter.spark.start=true
extent.reporter.spark.out=target/extent-reports/extent.html

# Optional: additional reporters
extent.reporter.json.start=true
extent.reporter.json.out=target/extent-reports/extent.json
extent.reporter.pdf.start=false

# Make sure images are embedded as base64:
extent.reporter.spark.base64images=true

# Theme and view config
spark.config.title=Automation Report
spark.config.theme=standard

# System info entries shown in the report
systeminfo.os=${os.name}
systeminfo.user=Pooja S Nair
systeminfo.environment=QA
systeminfo.build=1.0.0

# (Optional) Attach screenshots automatically for failed steps
# The adapter picks attachments done via Scenario.attach()
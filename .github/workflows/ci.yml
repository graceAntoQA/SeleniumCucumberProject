name: Selenium Automation CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Show project structure
        run: |
          pwd
          find src -type f

      - name: List compiled test classes
        run: |
          mvn test-compile
          find target/test-classes -type f

      - name: Verify Maven
        run: mvn -version

      - name: Compile Project
        run: mvn clean compile

      - name: Execute Tests
        run: mvn clean test

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Cucumber-Report
          path: target/cucumber-report.html